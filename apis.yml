name: Google News RSS API
description: >-
  Google News provides RSS feeds that deliver news headlines organized by topic,
  location, and search query. The feeds expose structured XML data that can be
  consumed programmatically to retrieve top stories, topic-based headlines
  (World, Business, Technology, Sports, etc.), location-specific news, and
  keyword search results across multiple languages and regions.
